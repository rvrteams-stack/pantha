<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Keto Coffee PT Mindmap</title>
    <style>
      :root {
        --bg: #edf4ff;
        --panel: rgba(255, 255, 255, 0.36);
        --ink: #21304d;
        --muted: rgba(33, 48, 77, 0.62);
        --line: rgba(255, 255, 255, 0.72);
        --hairline: rgba(33, 48, 77, 0.1);
        --shadow: 0 28px 90px rgba(61, 91, 145, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 16% 18%, rgba(255, 255, 255, 0.9) 0 10%, transparent 34%),
          radial-gradient(circle at 78% 22%, rgba(186, 215, 255, 0.72) 0 12%, transparent 38%),
          radial-gradient(circle at 86% 84%, rgba(255, 209, 236, 0.72) 0 10%, transparent 34%),
          radial-gradient(circle at 24% 82%, rgba(167, 205, 255, 0.72) 0 13%, transparent 38%),
          linear-gradient(135deg, #fbfaff 0%, #eaf3ff 42%, #d8e8ff 72%, #fff0fb 100%),
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      a {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: block;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        margin: 0;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.56), rgba(255, 255, 255, 0.22));
        backdrop-filter: blur(26px) saturate(1.55);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.8),
          0 18px 50px rgba(61, 91, 145, 0.14);
        position: fixed;
        top: 18px;
        right: 18px;
        z-index: 10;
      }

      .title-block {
        display: none;
      }

      .eyebrow {
        color: var(--aqua);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 2px 0 0;
        font-size: clamp(25px, 3.2vw, 42px);
        line-height: 1.05;
        letter-spacing: 0;
        color: #0b1220;
      }

      .meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .map-tabs {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px;
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.28);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.66);
      }

      .text-button {
        min-height: 34px;
        border: 1px solid rgba(255, 255, 255, 0.7);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.24));
        color: var(--ink);
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.74),
          0 10px 22px rgba(61, 91, 145, 0.1);
      }

      .text-button {
        padding: 0 11px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 750;
      }

      .text-button:hover {
        border-color: rgba(255, 255, 255, 0.92);
        background: rgba(255, 255, 255, 0.72);
        transform: translateY(-1px);
      }

      .map-tab.is-active {
        background: rgba(255, 255, 255, 0.78);
        border-color: rgba(255, 255, 255, 0.92);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          0 10px 22px rgba(61, 91, 145, 0.12);
      }

      .workspace {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
        gap: 12px;
        padding: 0;
      }

      .workspace.source-hidden {
        grid-template-columns: minmax(0, 1fr);
      }

      .map-shell,
      .outline {
        min-height: 0;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .map-shell {
        position: relative;
        height: 100vh;
        background:
          radial-gradient(circle at 22% 24%, rgba(255, 255, 255, 0.82) 0 11%, transparent 35%),
          radial-gradient(circle at 78% 18%, rgba(196, 218, 255, 0.62) 0 13%, transparent 42%),
          radial-gradient(circle at 86% 84%, rgba(255, 216, 244, 0.72) 0 12%, transparent 38%),
          radial-gradient(circle at 30% 82%, rgba(157, 195, 249, 0.56) 0 14%, transparent 44%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(224, 237, 255, 0.66) 56%, rgba(255, 239, 250, 0.7));
        backdrop-filter: blur(34px) saturate(1.36);
        isolation: isolate;
      }

      .map-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          linear-gradient(118deg, rgba(255, 255, 255, 0.7), transparent 23% 74%, rgba(255, 255, 255, 0.36)),
          radial-gradient(circle at 50% 48%, rgba(255, 255, 255, 0.22), transparent 34%);
      }

      .map-shell::after {
        content: "";
        position: absolute;
        inset: 1px;
        z-index: 0;
        pointer-events: none;
        border-radius: 27px;
        border: 1px solid rgba(255, 255, 255, 0.78);
      }

      #mindmap {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: block;
        cursor: grab;
        touch-action: none;
      }

      #mindmap:active {
        cursor: grabbing;
      }

      .status {
        position: absolute;
        left: 16px;
        bottom: 16px;
        max-width: min(420px, calc(100% - 32px));
        z-index: 2;
        padding: 10px 13px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.38);
        border: 1px solid rgba(255, 255, 255, 0.72);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
        backdrop-filter: blur(18px) saturate(1.3);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.8),
          0 14px 38px rgba(15, 23, 42, 0.12);
      }

      .outline {
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
        background: rgba(255, 255, 255, 0.58);
        backdrop-filter: blur(28px) saturate(1.25);
      }

      .outline-header {
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--hairline);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .outline-header strong {
        font-size: 14px;
      }

      .outline-header span {
        color: var(--muted);
        font-size: 12px;
      }

      pre {
        margin: 0;
        padding: 14px;
        overflow: auto;
        color: #2e2a24;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 980px) {
        .topbar {
          grid-template-columns: 1fr;
        }

        .toolbar {
          justify-content: flex-start;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .map-shell {
          height: 100vh;
        }

        .outline {
          height: 44vh;
        }
      }

      @media (max-width: 640px) {
        .topbar {
          left: 10px;
          right: 10px;
          top: 10px;
          justify-content: center;
          flex-wrap: wrap;
          border-radius: 18px;
        }

        .workspace {
          padding: 0;
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="title-block">
          <div class="eyebrow">Approach map</div>
          <h1 id="page-title">Keto Coffee PT</h1>
          <div class="meta" id="page-meta">Loading outline...</div>
        </div>
        <nav class="toolbar" aria-label="Mindmap actions">
          <div class="map-tabs" id="map-tabs" aria-label="Mindmap tabs"></div>
          <button class="text-button" id="fit-button" title="Fit map" type="button">Center</button>
          <button class="text-button" id="reload-button" title="Reload outline" type="button">Reload</button>
          <button class="text-button" id="toggle-source" type="button">
            <span>Source</span>
          </button>
          <a class="text-button" id="edit-link" href="https://github.com/rvrteams-stack/pantha/edit/main/mindmap.md" target="_blank" rel="noopener">
            <span>Edit</span>
          </a>
          <a class="text-button" id="markdown-link" href="./mindmap.md">
            <span>Markdown</span>
          </a>
        </nav>
      </header>

      <main class="workspace source-hidden">
        <section class="map-shell" aria-label="Interactive mindmap">
          <svg id="mindmap"></svg>
          <div class="status" id="status">Loading mindmap.md...</div>
        </section>

        <aside class="outline hidden" id="outline-panel" aria-label="Markdown outline">
          <div class="outline-header">
            <strong>Source outline</strong>
            <span id="source-file-label">Edited in mindmap.md</span>
          </div>
          <pre id="outline-source">Loading...</pre>
        </aside>
      </main>
    </div>

    <script>
      const state = {
        tree: null,
        layout: null,
        markdown: "",
        scale: 1,
        panX: 0,
        panY: 0,
        targetScale: 1,
        targetPanX: 0,
        targetPanY: 0,
        transformFrame: null,
        dragging: false,
        dragStart: null,
        currentMap: null,
      };

      const nodes = {
        title: document.querySelector("#page-title"),
        meta: document.querySelector("#page-meta"),
        status: document.querySelector("#status"),
        source: document.querySelector("#outline-source"),
        svg: document.querySelector("#mindmap"),
        outline: document.querySelector("#outline-panel"),
        workspace: document.querySelector(".workspace"),
        mapTabs: document.querySelector("#map-tabs"),
        editLink: document.querySelector("#edit-link"),
        markdownLink: document.querySelector("#markdown-link"),
        sourceFileLabel: document.querySelector("#source-file-label"),
        fit: document.querySelector("#fit-button"),
        reload: document.querySelector("#reload-button"),
        toggleSource: document.querySelector("#toggle-source"),
      };

      const maps = [
        {
          id: "keto",
          label: "Keto Coffee PT",
          file: "mindmap.md",
          editUrl: "https://github.com/rvrteams-stack/pantha/edit/main/mindmap.md",
        },
        {
          id: "fitforma",
          label: "FitForma",
          file: "fitforma.md",
          editUrl: "https://github.com/rvrteams-stack/pantha/edit/main/fitforma.md",
        },
      ];

      state.currentMap = maps[0];

      const palette = ["#dfeaff", "#e8e7ff", "#dceaff", "#efe6ff", "#e3efff", "#f3e9ff"];
      const box = {
        rootWidth: 320,
        branchWidth: 260,
        leafWidth: 190,
        lineHeight: 20,
        paddingX: 18,
        paddingY: 14,
      };

      function getTitle(markdown) {
        const match = markdown.match(/^#\s+(.+)$/m);
        return match ? match[1].trim() : "Keto Coffee PT";
      }

      function getUpdated(markdown) {
        const match = markdown.match(/<!--\s*updated:\s*([^>]+?)\s*-->/i);
        return match ? match[1].trim() : "Draft";
      }

      function renderTabs() {
        nodes.mapTabs.innerHTML = maps
          .map((map) => {
            const activeClass = map.id === state.currentMap.id ? " is-active" : "";
            return `<button class="text-button map-tab${activeClass}" type="button" data-map-id="${map.id}">${escapeHtml(map.label)}</button>`;
          })
          .join("");
      }

      function setCurrentMap(mapId) {
        const nextMap = maps.find((map) => map.id === mapId);
        if (!nextMap || nextMap.id === state.currentMap.id) return;
        state.currentMap = nextMap;
        renderTabs();
        loadMindmap();
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function wrapText(text, maxChars) {
        const words = text.split(/\s+/).filter(Boolean);
        const lines = [];
        let current = "";

        for (const word of words) {
          if (!current) {
            current = word;
          } else if (`${current} ${word}`.length <= maxChars) {
            current = `${current} ${word}`;
          } else {
            lines.push(current);
            current = word;
          }
        }

        if (current) lines.push(current);
        return lines.length ? lines : [text];
      }

      function createNode(text, level, kind = "heading") {
        const isRootLevel = level <= 1;
        const width = isRootLevel ? box.rootWidth : level === 2 ? box.branchWidth : box.leafWidth;
        const lines = wrapText(text, isRootLevel ? 22 : level === 2 ? 24 : 16);
        const minHeight = isRootLevel ? 104 : level === 2 ? 76 : 62;
        return {
          id: Math.random().toString(36).slice(2),
          text,
          level,
          kind,
          children: [],
          lines,
          width,
          height: Math.max(minHeight, lines.length * box.lineHeight + box.paddingY * 2),
          x: 0,
          y: 0,
          side: 1,
        };
      }

      function addChild(parent, node) {
        node.siblingIndex = parent.children.length + 1;
        parent.children.push(node);
        return node;
      }

      function parseMarkdown(markdown) {
        const root = createNode(getTitle(markdown), 1);
        const stack = [root];

        for (const rawLine of markdown.split("\n")) {
          const line = rawLine.replace(/\s+$/, "");
          if (!line.trim() || line.trim().startsWith("<!--")) continue;

          const heading = line.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            const level = heading[1].length;
            const text = heading[2].trim();
            if (level === 1) {
              root.text = text;
              root.lines = wrapText(text, 28);
              continue;
            }

            const node = createNode(text, level, "heading");
            while (stack.length && stack[stack.length - 1].level >= level) stack.pop();
            const parent = stack[stack.length - 1] || root;
            addChild(parent, node);
            stack.push(node);
            continue;
          }

          const bullet = line.match(/^(\s*)[-*]\s+(.+)$/);
          if (bullet) {
            const indent = Math.floor(bullet[1].replaceAll("\t", "  ").length / 2);
            const parentHeading = stack[stack.length - 1] || root;
            const level = parentHeading.level + indent + 1;
            const node = createNode(bullet[2].trim(), level, "bullet");

            while (stack.length && stack[stack.length - 1].level >= level) stack.pop();
            const parent = stack[stack.length - 1] || root;
            addChild(parent, node);
            stack.push(node);
          }
        }

        return root;
      }

      function measureTree(root) {
        root.depth = 0;
        root.side = 0;
        root.cx = 0;
        root.cy = 0;

        const directChildren = root.children;
        const leftCount = Math.ceil(directChildren.length / 2);
        const left = directChildren.slice(0, leftCount);
        const right = directChildren.slice(leftCount);
        const branchGap = 70;
        const branchOffset = 405;
        const childOffset = 285;
        const childGap = 28;

        function calculateSpan(node) {
          if (!node.children.length) {
            node.subtreeHeight = node.height;
            return node.subtreeHeight;
          }

          const childrenHeight =
            node.children.reduce((total, child) => total + calculateSpan(child), 0) +
            childGap * Math.max(0, node.children.length - 1);
          node.subtreeHeight = Math.max(node.height, childrenHeight);
          return node.subtreeHeight;
        }

        function sideHeight(children) {
          if (!children.length) return 0;
          return (
            children.reduce((total, child) => total + child.subtreeHeight, 0) +
            branchGap * Math.max(0, children.length - 1)
          );
        }

        function placeDescendants(node, side, depth, cx, cy) {
          node.depth = depth;
          node.side = side;
          node.cx = cx;
          node.cy = cy;

          const totalChildrenHeight =
            node.children.reduce((total, child) => total + child.subtreeHeight, 0) +
            childGap * Math.max(0, node.children.length - 1);
          let cursor = node.cy - totalChildrenHeight / 2;

          node.children.forEach((child) => {
            const childCy = cursor + child.subtreeHeight / 2;
            placeDescendants(child, side, depth + 1, node.cx + side * childOffset, childCy);
            cursor += child.subtreeHeight + childGap;
          });
        }

        directChildren.forEach(calculateSpan);

        function placeSide(children, side) {
          const totalHeight = sideHeight(children);
          let cursor = -totalHeight / 2;

          children.forEach((child) => {
            const childCy = cursor + child.subtreeHeight / 2;
            placeDescendants(child, side, 1, side * branchOffset, childCy);
            cursor += child.subtreeHeight + branchGap;
          });
        }

        placeSide(left, -1);
        placeSide(right, 1);

        flattenTree(root).forEach(({ node }) => {
          node.x = node.cx - node.width / 2;
          node.y = node.cy - node.height / 2;
        });

        const nodesList = flattenTree(root).map((item) => item.node);
        const minX = Math.min(...nodesList.map((node) => node.x));
        const maxX = Math.max(...nodesList.map((node) => node.x + node.width));
        const minY = Math.min(...nodesList.map((node) => node.y));
        const maxY = Math.max(...nodesList.map((node) => node.y + node.height));
        const margin = 110;

        nodesList.forEach((node) => {
          node.x += -minX + margin;
          node.y += -minY + margin;
          node.cx = node.x + node.width / 2;
          node.cy = node.y + node.height / 2;
        });

        return {
          minX: 0,
          minY: 0,
          height: Math.max(maxY - minY + margin * 2, 520),
          width: Math.max(maxX - minX + margin * 2, 980),
        };
      }

      function flattenTree(root) {
        const list = [];
        function walk(node, parent = null) {
          list.push({ node, parent });
          node.children.forEach((child) => walk(child, node));
        }
        walk(root);
        return list;
      }

      function nodeMarkup(node) {
        const x = node.x;
        const y = node.y;
        const isRoot = node.depth === 0;
        const isBranch = node.depth === 1;
        const fill = isRoot ? "url(#root-glass)" : "url(#node-glass)";
        const textFill = "#1e2d49";
        const radius = isRoot ? 42 : isBranch ? 34 : 30;
        const textX = x + node.width / 2;
        const textY = node.cy - ((node.lines.length - 1) * box.lineHeight) / 2 + 7;
        const tspans = node.lines
          .map((line, index) => {
            const dy = index === 0 ? 0 : box.lineHeight;
            return `<tspan x="${textX}" dy="${dy}">${escapeHtml(line)}</tspan>`;
          })
          .join("");
        const shine = `<rect x="${x + 3}" y="${y + 3}" width="${node.width - 6}" height="${Math.min(34, node.height * 0.42)}" rx="${radius - 3}" fill="url(#glass-shine)" opacity="0.82"></rect>`;
        const edge = `<rect x="${x + 1.2}" y="${y + 1.2}" width="${node.width - 2.4}" height="${node.height - 2.4}" rx="${radius - 1.2}" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.88"></rect>`;
        const innerEdge = `<rect x="${x + 4.5}" y="${y + 4.5}" width="${node.width - 9}" height="${node.height - 9}" rx="${radius - 4.5}" fill="none" stroke="#dbe8ff" stroke-width="1" opacity="0.42"></rect>`;

        return `
          <g class="map-node" transform="translate(0, 0)">
            <rect x="${x}" y="${y}" width="${node.width}" height="${node.height}" rx="${radius}" fill="${fill}" stroke="#ffffff" stroke-width="1.4" opacity="0.96"></rect>
            ${shine}
            ${edge}
            ${innerEdge}
            <text x="${textX}" y="${textY}" fill="${textFill}" text-anchor="middle" font-size="${isRoot ? 25 : isBranch ? 18 : 16}" font-weight="${isRoot ? 760 : 520}">${tspans}</text>
          </g>
        `;
      }

      function linkMarkup(parent, node) {
        const startX = node.side === -1 ? parent.x : parent.x + parent.width;
        const startY = parent.cy;
        const endX = node.side === -1 ? node.x + node.width : node.x;
        const endY = node.cy;
        const midX = startX + (endX - startX) * 0.46;
        const dotStart = node.depth === 1 ? `<circle cx="${startX}" cy="${startY}" r="5.2" fill="#ffffff" opacity="0.96"></circle>` : "";

        const d = `M ${startX} ${startY} C ${midX} ${startY}, ${midX} ${endY}, ${endX} ${endY}`;
        return `
          <path d="${d}" fill="none" stroke="#ffffff" stroke-width="${node.depth === 1 ? 5.2 : 4.6}" opacity="0.86" stroke-linecap="round" filter="url(#line-glow)"></path>
          <path d="${d}" fill="none" stroke="#e9f3ff" stroke-width="${node.depth === 1 ? 2.2 : 1.8}" opacity="0.86" stroke-linecap="round"></path>
          ${dotStart}
          <circle cx="${endX}" cy="${endY}" r="5.2" fill="#ffffff" opacity="0.96"></circle>
        `;
      }

      function applyTransform() {
        const group = nodes.svg.querySelector("#map-content");
        if (!group) return;
        group.setAttribute("transform", `translate(${state.panX} ${state.panY}) scale(${state.scale})`);
      }

      function stopTransformAnimation() {
        if (!state.transformFrame) return;
        window.cancelAnimationFrame(state.transformFrame);
        state.transformFrame = null;
      }

      function animateTransform() {
        state.panX += (state.targetPanX - state.panX) * 0.12;
        state.panY += (state.targetPanY - state.panY) * 0.12;
        state.scale += (state.targetScale - state.scale) * 0.12;
        applyTransform();

        const settled =
          Math.abs(state.panX - state.targetPanX) < 0.2 &&
          Math.abs(state.panY - state.targetPanY) < 0.2 &&
          Math.abs(state.scale - state.targetScale) < 0.001;

        if (settled) {
          state.panX = state.targetPanX;
          state.panY = state.targetPanY;
          state.scale = state.targetScale;
          applyTransform();
          state.transformFrame = null;
          return;
        }

        state.transformFrame = window.requestAnimationFrame(animateTransform);
      }

      function setTransformTarget(panX, panY, scale, immediate = false) {
        state.targetPanX = panX;
        state.targetPanY = panY;
        state.targetScale = scale;

        if (immediate) {
          stopTransformAnimation();
          state.panX = panX;
          state.panY = panY;
          state.scale = scale;
          applyTransform();
          return;
        }

        if (!state.transformFrame) {
          state.transformFrame = window.requestAnimationFrame(animateTransform);
        }
      }

      function fitMap(immediate = false) {
        if (!state.layout) return;
        const bounds = nodes.svg.getBoundingClientRect();
        const scaleX = (bounds.width - 56) / state.layout.width;
        const scaleY = (bounds.height - 56) / state.layout.height;
        const nextScale = Math.max(0.38, Math.min(1.34, Math.min(scaleX, scaleY)));
        const scaledWidth = state.layout.width * nextScale;
        const scaledHeight = state.layout.height * nextScale;
        const centerPan = (viewportSize, contentSize) => {
          const centered = (viewportSize - contentSize) / 2;
          return contentSize > viewportSize ? centered : Math.max(32, centered);
        };
        const nextPanX = centerPan(bounds.width, scaledWidth);
        const nextPanY = centerPan(bounds.height, scaledHeight);
        setTransformTarget(nextPanX, nextPanY, nextScale, immediate);
      }

      function renderMindmap(markdown) {
        const tree = parseMarkdown(markdown);
        const layout = measureTree(tree);
        const items = flattenTree(tree);
        const links = items
          .filter((item) => item.parent)
          .map((item) => linkMarkup(item.parent, item.node))
          .join("");
        const nodeHtml = items.map((item) => nodeMarkup(item.node)).join("");

        state.tree = tree;
        state.layout = layout;
        nodes.svg.innerHTML = `
          <defs>
            <linearGradient id="root-glass" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.82"></stop>
              <stop offset="42%" stop-color="#e9f2ff" stop-opacity="0.7"></stop>
              <stop offset="100%" stop-color="#c8e3ff" stop-opacity="0.58"></stop>
            </linearGradient>
            <linearGradient id="node-glass" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.66"></stop>
              <stop offset="52%" stop-color="#eef5ff" stop-opacity="0.48"></stop>
              <stop offset="100%" stop-color="#d9eaff" stop-opacity="0.36"></stop>
            </linearGradient>
            <linearGradient id="glass-shine" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.94"></stop>
              <stop offset="48%" stop-color="#ffffff" stop-opacity="0.24"></stop>
              <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
            </linearGradient>
            <filter id="node-shadow" x="-20%" y="-30%" width="140%" height="160%">
              <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#6d8ec8" flood-opacity="0.18"></feDropShadow>
              <feDropShadow dx="0" dy="-2" stdDeviation="3" flood-color="#ffffff" flood-opacity="0.42"></feDropShadow>
            </filter>
            <filter id="line-glow" x="-40%" y="-40%" width="180%" height="180%">
              <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ffffff" flood-opacity="0.76"></feDropShadow>
              <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#b7d6ff" flood-opacity="0.42"></feDropShadow>
            </filter>
          </defs>
          <g id="map-content">
            <g class="links">${links}</g>
            <g class="nodes" filter="url(#node-shadow)">${nodeHtml}</g>
          </g>
        `;
        fitMap(true);
      }

      async function loadMindmap() {
        const activeMap = state.currentMap;
        nodes.status.textContent = `Loading ${activeMap.label}...`;
        nodes.editLink.href = activeMap.editUrl;
        nodes.markdownLink.href = `./${activeMap.file}`;
        nodes.sourceFileLabel.textContent = `Edited in ${activeMap.file}`;

        try {
          const response = await fetch(`./${activeMap.file}?ts=${Date.now()}`, {
            cache: "no-store",
          });

          if (!response.ok) {
            throw new Error(`${activeMap.file} returned ${response.status}`);
          }

          const markdown = await response.text();
          if (activeMap.id !== state.currentMap.id) return;
          state.markdown = markdown;
          nodes.title.textContent = getTitle(markdown);
          nodes.meta.textContent = `Updated: ${getUpdated(markdown)}. ${activeMap.label} branches are ready for the next content pass.`;
          nodes.source.textContent = markdown;
          renderMindmap(markdown);
          nodes.status.textContent = "Drag to move. Scroll gently to zoom. Center brings the map back.";
        } catch (error) {
          nodes.meta.textContent = "Could not load the source outline.";
          nodes.source.textContent = String(error);
          nodes.svg.innerHTML = "";
          nodes.status.textContent = `Could not load ${activeMap.file}. Check that it is published next to index.html.`;
        }
      }

      nodes.fit.addEventListener("click", () => {
        fitMap();
      });

      nodes.reload.addEventListener("click", loadMindmap);

      nodes.mapTabs.addEventListener("click", (event) => {
        const button = event.target.closest("[data-map-id]");
        if (!button) return;
        setCurrentMap(button.dataset.mapId);
      });

      nodes.toggleSource.addEventListener("click", () => {
        nodes.outline.classList.toggle("hidden");
        nodes.workspace.classList.toggle("source-hidden");
        window.setTimeout(fitMap, 80);
      });

      nodes.svg.addEventListener("pointerdown", (event) => {
        stopTransformAnimation();
        state.dragging = true;
        state.dragStart = {
          x: event.clientX,
          y: event.clientY,
          panX: state.panX,
          panY: state.panY,
        };
        nodes.svg.setPointerCapture(event.pointerId);
      });

      nodes.svg.addEventListener("pointermove", (event) => {
        if (!state.dragging || !state.dragStart) return;
        state.panX = state.dragStart.panX + event.clientX - state.dragStart.x;
        state.panY = state.dragStart.panY + event.clientY - state.dragStart.y;
        state.targetPanX = state.panX;
        state.targetPanY = state.panY;
        state.targetScale = state.scale;
        applyTransform();
      });

      nodes.svg.addEventListener("pointerup", (event) => {
        state.dragging = false;
        state.dragStart = null;
        nodes.svg.releasePointerCapture(event.pointerId);
      });

      nodes.svg.addEventListener("pointercancel", () => {
        state.dragging = false;
        state.dragStart = null;
      });

      nodes.svg.addEventListener(
        "wheel",
        (event) => {
          event.preventDefault();
          const bounds = nodes.svg.getBoundingClientRect();
          const oldScale = state.targetScale || state.scale;
          const delta = Math.max(-56, Math.min(56, event.deltaY));
          const nextScale = Math.max(0.32, Math.min(1.9, oldScale * Math.exp(-delta * 0.0008)));
          const px = event.clientX - bounds.left;
          const py = event.clientY - bounds.top;
          const nextPanX = px - ((px - state.targetPanX) / oldScale) * nextScale;
          const nextPanY = py - ((py - state.targetPanY) / oldScale) * nextScale;
          setTransformTarget(nextPanX, nextPanY, nextScale);
        },
        { passive: false },
      );

      window.addEventListener("resize", () => fitMap(true));

      renderTabs();
      loadMindmap();
    </script>
  </body>
</html>
