<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Keto Coffee PT Mindmap</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: rgba(255, 255, 255, 0.68);
        --ink: #111827;
        --muted: #667085;
        --line: rgba(255, 255, 255, 0.64);
        --hairline: rgba(17, 24, 39, 0.1);
        --aqua: #00a6c8;
        --indigo: #5b6cff;
        --violet: #8b5cf6;
        --rose: #f05f7e;
        --amber: #f59e0b;
        --green: #10b981;
        --shadow: 0 28px 90px rgba(15, 23, 42, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(124deg, rgba(0, 166, 200, 0.14) 0%, transparent 34%),
          linear-gradient(236deg, rgba(139, 92, 246, 0.12) 0%, transparent 42%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(236, 242, 255, 0.72)),
          repeating-linear-gradient(0deg, rgba(17, 24, 39, 0.032) 0 1px, transparent 1px 44px),
          repeating-linear-gradient(90deg, rgba(17, 24, 39, 0.026) 0 1px, transparent 1px 44px),
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      a {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 20px;
        align-items: center;
        margin: 14px 14px 0;
        padding: 16px 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0.46));
        backdrop-filter: blur(28px) saturate(1.4);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.82),
          0 18px 60px rgba(15, 23, 42, 0.1);
        position: sticky;
        top: 10px;
        z-index: 5;
      }

      .title-block {
        min-width: 0;
      }

      .eyebrow {
        color: var(--aqua);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 2px 0 0;
        font-size: clamp(25px, 3.2vw, 42px);
        line-height: 1.05;
        letter-spacing: 0;
        color: #0b1220;
      }

      .meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .text-button {
        min-height: 38px;
        border: 1px solid rgba(255, 255, 255, 0.76);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.42));
        color: var(--ink);
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.86),
          0 12px 26px rgba(15, 23, 42, 0.1);
      }

      .text-button {
        padding: 0 12px;
        text-decoration: none;
        font-weight: 700;
      }

      .text-button:hover {
        border-color: rgba(91, 108, 255, 0.34);
        background: #ffffff;
        transform: translateY(-1px);
      }

      .workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
        gap: 14px;
        padding: 14px;
      }

      .workspace.source-hidden {
        grid-template-columns: minmax(0, 1fr);
      }

      .map-shell,
      .outline {
        min-height: 0;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .map-shell {
        position: relative;
        height: calc(100vh - 124px);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.76), rgba(248, 250, 255, 0.58)),
          linear-gradient(220deg, rgba(91, 108, 255, 0.09), transparent 48%),
          linear-gradient(35deg, rgba(0, 166, 200, 0.09), transparent 44%),
          repeating-linear-gradient(0deg, rgba(17, 24, 39, 0.028) 0 1px, transparent 1px 42px),
          repeating-linear-gradient(90deg, rgba(17, 24, 39, 0.022) 0 1px, transparent 1px 42px);
        backdrop-filter: blur(28px) saturate(1.25);
        isolation: isolate;
      }

      .map-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          linear-gradient(115deg, rgba(255, 255, 255, 0.66), transparent 22% 78%, rgba(255, 255, 255, 0.34)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.54), transparent 42%);
      }

      .map-shell::after {
        content: "";
        position: absolute;
        inset: 1px;
        z-index: 0;
        pointer-events: none;
        border-radius: 21px;
        border: 1px solid rgba(255, 255, 255, 0.72);
      }

      #mindmap {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: block;
        cursor: grab;
        touch-action: none;
      }

      #mindmap:active {
        cursor: grabbing;
      }

      .status {
        position: absolute;
        left: 16px;
        bottom: 16px;
        max-width: min(420px, calc(100% - 32px));
        z-index: 2;
        padding: 10px 13px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.72);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
        backdrop-filter: blur(18px) saturate(1.3);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.8),
          0 14px 38px rgba(15, 23, 42, 0.12);
      }

      .outline {
        height: calc(100vh - 124px);
        display: grid;
        grid-template-rows: auto 1fr;
        background: rgba(255, 255, 255, 0.64);
        backdrop-filter: blur(28px) saturate(1.25);
      }

      .outline-header {
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--hairline);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .outline-header strong {
        font-size: 14px;
      }

      .outline-header span {
        color: var(--muted);
        font-size: 12px;
      }

      pre {
        margin: 0;
        padding: 14px;
        overflow: auto;
        color: #2e2a24;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 980px) {
        .topbar {
          grid-template-columns: 1fr;
        }

        .toolbar {
          justify-content: flex-start;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .map-shell {
          height: min(70vh, 680px);
        }

        .outline {
          height: 44vh;
        }
      }

      @media (max-width: 640px) {
        .topbar {
          padding: 14px;
        }

        .workspace {
          padding: 10px;
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="title-block">
          <div class="eyebrow">Approach map</div>
          <h1 id="page-title">Keto Coffee PT</h1>
          <div class="meta" id="page-meta">Loading outline...</div>
        </div>
        <nav class="toolbar" aria-label="Mindmap actions">
          <button class="text-button" id="fit-button" title="Fit map" type="button">Center</button>
          <button class="text-button" id="reload-button" title="Reload outline" type="button">Reload</button>
          <button class="text-button" id="toggle-source" type="button">
            <span>Source</span>
          </button>
          <a class="text-button" href="./mindmap.md">
            <span>Markdown</span>
          </a>
        </nav>
      </header>

      <main class="workspace source-hidden">
        <section class="map-shell" aria-label="Interactive mindmap">
          <svg id="mindmap"></svg>
          <div class="status" id="status">Loading mindmap.md...</div>
        </section>

        <aside class="outline hidden" id="outline-panel" aria-label="Markdown outline">
          <div class="outline-header">
            <strong>Source outline</strong>
            <span>Edited in mindmap.md</span>
          </div>
          <pre id="outline-source">Loading...</pre>
        </aside>
      </main>
    </div>

    <script>
      const state = {
        tree: null,
        layout: null,
        markdown: "",
        scale: 1,
        panX: 0,
        panY: 0,
        targetScale: 1,
        targetPanX: 0,
        targetPanY: 0,
        transformFrame: null,
        dragging: false,
        dragStart: null,
      };

      const nodes = {
        title: document.querySelector("#page-title"),
        meta: document.querySelector("#page-meta"),
        status: document.querySelector("#status"),
        source: document.querySelector("#outline-source"),
        svg: document.querySelector("#mindmap"),
        outline: document.querySelector("#outline-panel"),
        workspace: document.querySelector(".workspace"),
        fit: document.querySelector("#fit-button"),
        reload: document.querySelector("#reload-button"),
        toggleSource: document.querySelector("#toggle-source"),
      };

      const palette = ["#00a6c8", "#5b6cff", "#8b5cf6", "#f05f7e", "#f59e0b", "#10b981"];
      const box = { width: 292, rootWidth: 340, lineHeight: 19, paddingX: 20, paddingY: 15 };

      function getTitle(markdown) {
        const match = markdown.match(/^#\s+(.+)$/m);
        return match ? match[1].trim() : "Keto Coffee PT";
      }

      function getUpdated(markdown) {
        const match = markdown.match(/<!--\s*updated:\s*([^>]+?)\s*-->/i);
        return match ? match[1].trim() : "Draft";
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function wrapText(text, maxChars) {
        const words = text.split(/\s+/).filter(Boolean);
        const lines = [];
        let current = "";

        for (const word of words) {
          if (!current) {
            current = word;
          } else if (`${current} ${word}`.length <= maxChars) {
            current = `${current} ${word}`;
          } else {
            lines.push(current);
            current = word;
          }
        }

        if (current) lines.push(current);
        return lines.length ? lines : [text];
      }

      function createNode(text, level, kind = "heading") {
        const lines = wrapText(text, level <= 1 ? 20 : 29);
        const minHeight = level <= 1 ? 96 : kind === "bullet" ? 48 : 74;
        return {
          id: Math.random().toString(36).slice(2),
          text,
          level,
          kind,
          children: [],
          lines,
          width: level <= 1 ? box.rootWidth : box.width,
          height: Math.max(minHeight, lines.length * box.lineHeight + box.paddingY * 2),
          x: 0,
          y: 0,
        };
      }

      function addChild(parent, node) {
        node.siblingIndex = parent.children.length + 1;
        parent.children.push(node);
        return node;
      }

      function parseMarkdown(markdown) {
        const root = createNode(getTitle(markdown), 1);
        const stack = [root];

        for (const rawLine of markdown.split("\n")) {
          const line = rawLine.replace(/\s+$/, "");
          if (!line.trim() || line.trim().startsWith("<!--")) continue;

          const heading = line.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            const level = heading[1].length;
            const text = heading[2].trim();
            if (level === 1) {
              root.text = text;
              root.lines = wrapText(text, 28);
              continue;
            }

            const node = createNode(text, level, "heading");
            while (stack.length && stack[stack.length - 1].level >= level) stack.pop();
            const parent = stack[stack.length - 1] || root;
            addChild(parent, node);
            stack.push(node);
            continue;
          }

          const bullet = line.match(/^(\s*)[-*]\s+(.+)$/);
          if (bullet) {
            const indent = Math.floor(bullet[1].replaceAll("\t", "  ").length / 2);
            const parentHeading = stack[stack.length - 1] || root;
            const level = parentHeading.level + indent + 1;
            const node = createNode(bullet[2].trim(), level, "bullet");

            while (stack.length && stack[stack.length - 1].level >= level) stack.pop();
            const parent = stack[stack.length - 1] || root;
            addChild(parent, node);
            stack.push(node);
          }
        }

        return root;
      }

      function measureTree(root) {
        let maxDepth = 1;
        let cursor = 0;

        function place(node, depth) {
          maxDepth = Math.max(maxDepth, depth);
          node.depth = depth;
          node.x = depth * 368;

          if (!node.children.length) {
            node.y = cursor + node.height / 2;
            cursor += node.height + (depth <= 1 ? 28 : 18);
            return;
          }

          node.children.forEach((child) => place(child, depth + 1));
          const first = node.children[0];
          const last = node.children[node.children.length - 1];
          node.y = (first.y + last.y) / 2;
        }

        place(root, 0);

        return {
          maxDepth,
          height: Math.max(cursor, 380),
          width: maxDepth * 368 + box.width + 104,
        };
      }

      function flattenTree(root) {
        const list = [];
        function walk(node, parent = null) {
          list.push({ node, parent });
          node.children.forEach((child) => walk(child, node));
        }
        walk(root);
        return list;
      }

      function nodeMarkup(node) {
        const color = palette[node.depth % palette.length];
        const x = node.x;
        const y = node.y - node.height / 2;
        const isRoot = node.depth === 0;
        const isApproach = node.depth === 1 && node.kind === "heading";
        const fill = isRoot ? "url(#root-liquid)" : "url(#card-glass)";
        const stroke = isRoot ? "#ffffff" : "#ffffff";
        const textFill = isRoot ? "#ffffff" : "#111827";
        const radius = isRoot ? 28 : isApproach ? 22 : 16;
        const textX = isApproach ? x + 82 : x + box.paddingX;
        const textY = isRoot ? y + 38 : y + box.paddingY + 15;
        const tspans = node.lines
          .map((line, index) => {
            const dy = index === 0 ? 0 : isRoot ? 25 : box.lineHeight;
            return `<tspan x="${textX}" dy="${dy}">${escapeHtml(line)}</tspan>`;
          })
          .join("");
        const approachBadge = isApproach
          ? `<rect x="${x + 18}" y="${y + 19}" width="46" height="36" rx="18" fill="${color}" opacity="0.92"></rect>
             <rect x="${x + 19}" y="${y + 20}" width="44" height="16" rx="8" fill="#ffffff" opacity="0.26"></rect>
             <text x="${x + 41}" y="${y + 42}" fill="#ffffff" text-anchor="middle" font-size="13" font-weight="900">${String(node.siblingIndex || 1).padStart(2, "0")}</text>`
          : "";
        const accentLine = !isRoot
          ? `<rect x="${x + 1}" y="${y + 1}" width="8" height="${node.height - 2}" rx="4" fill="${color}" opacity="0.78"></rect>`
          : `<path d="M ${x + 24} ${y + node.height - 22} H ${x + node.width - 24}" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" opacity="0.52"></path>`;
        const shine = `<rect x="${x + 1}" y="${y + 1}" width="${node.width - 2}" height="${Math.min(42, node.height * 0.46)}" rx="${radius - 1}" fill="url(#glass-shine)" opacity="${isRoot ? 0.62 : 0.74}"></rect>`;
        const outline = `<rect x="${x + 1}" y="${y + 1}" width="${node.width - 2}" height="${node.height - 2}" rx="${radius - 1}" fill="none" stroke="#ffffff" stroke-width="1" opacity="${isRoot ? 0.5 : 0.72}"></rect>`;

        return `
          <g class="map-node" transform="translate(0, 0)">
            <rect x="${x}" y="${y}" width="${node.width}" height="${node.height}" rx="${radius}" fill="${fill}" stroke="${stroke}" stroke-width="${isRoot ? 1.8 : 1.35}" opacity="${isRoot ? 1 : 0.94}"></rect>
            ${shine}
            ${outline}
            ${accentLine}
            ${approachBadge}
            <text x="${textX}" y="${textY}" fill="${textFill}" font-size="${isRoot ? 26 : isApproach ? 16 : 13}" font-weight="${node.kind === "bullet" ? 650 : 850}">${tspans}</text>
          </g>
        `;
      }

      function linkMarkup(parent, node) {
        const startX = parent.x + parent.width;
        const startY = parent.y;
        const endX = node.x;
        const endY = node.y;
        const midX = startX + (endX - startX) * 0.46;
        const color = palette[node.depth % palette.length];

        const d = `M ${startX} ${startY} C ${midX} ${startY}, ${midX} ${endY}, ${endX} ${endY}`;
        return `
          <path d="${d}" fill="none" stroke="#ffffff" stroke-width="${node.depth === 1 ? 9 : 6}" opacity="0.62" stroke-linecap="round"></path>
          <path d="${d}" fill="none" stroke="${color}" stroke-width="${node.depth === 1 ? 3.2 : 2}" opacity="${node.depth === 1 ? 0.72 : 0.56}" stroke-linecap="round"></path>
        `;
      }

      function applyTransform() {
        const group = nodes.svg.querySelector("#map-content");
        if (!group) return;
        group.setAttribute("transform", `translate(${state.panX} ${state.panY}) scale(${state.scale})`);
      }

      function stopTransformAnimation() {
        if (!state.transformFrame) return;
        window.cancelAnimationFrame(state.transformFrame);
        state.transformFrame = null;
      }

      function animateTransform() {
        state.panX += (state.targetPanX - state.panX) * 0.12;
        state.panY += (state.targetPanY - state.panY) * 0.12;
        state.scale += (state.targetScale - state.scale) * 0.12;
        applyTransform();

        const settled =
          Math.abs(state.panX - state.targetPanX) < 0.2 &&
          Math.abs(state.panY - state.targetPanY) < 0.2 &&
          Math.abs(state.scale - state.targetScale) < 0.001;

        if (settled) {
          state.panX = state.targetPanX;
          state.panY = state.targetPanY;
          state.scale = state.targetScale;
          applyTransform();
          state.transformFrame = null;
          return;
        }

        state.transformFrame = window.requestAnimationFrame(animateTransform);
      }

      function setTransformTarget(panX, panY, scale, immediate = false) {
        state.targetPanX = panX;
        state.targetPanY = panY;
        state.targetScale = scale;

        if (immediate) {
          stopTransformAnimation();
          state.panX = panX;
          state.panY = panY;
          state.scale = scale;
          applyTransform();
          return;
        }

        if (!state.transformFrame) {
          state.transformFrame = window.requestAnimationFrame(animateTransform);
        }
      }

      function fitMap(immediate = false) {
        if (!state.layout) return;
        const bounds = nodes.svg.getBoundingClientRect();
        const scaleX = (bounds.width - 56) / state.layout.width;
        const scaleY = (bounds.height - 56) / state.layout.height;
        const nextScale = Math.max(0.38, Math.min(1.34, Math.min(scaleX, scaleY)));
        const nextPanX = Math.max(32, (bounds.width - state.layout.width * nextScale) / 2);
        const nextPanY = Math.max(32, (bounds.height - state.layout.height * nextScale) / 2);
        setTransformTarget(nextPanX, nextPanY, nextScale, immediate);
      }

      function renderMindmap(markdown) {
        const tree = parseMarkdown(markdown);
        const layout = measureTree(tree);
        const items = flattenTree(tree);
        const links = items
          .filter((item) => item.parent)
          .map((item) => linkMarkup(item.parent, item.node))
          .join("");
        const nodeHtml = items.map((item) => nodeMarkup(item.node)).join("");

        state.tree = tree;
        state.layout = layout;
        nodes.svg.innerHTML = `
          <defs>
            <linearGradient id="root-liquid" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0f172a"></stop>
              <stop offset="42%" stop-color="#1d2b53"></stop>
              <stop offset="72%" stop-color="#3154ff"></stop>
              <stop offset="100%" stop-color="#00a6c8"></stop>
            </linearGradient>
            <linearGradient id="card-glass" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"></stop>
              <stop offset="45%" stop-color="#f8fbff" stop-opacity="0.74"></stop>
              <stop offset="100%" stop-color="#eaf1ff" stop-opacity="0.58"></stop>
            </linearGradient>
            <linearGradient id="glass-shine" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.94"></stop>
              <stop offset="48%" stop-color="#ffffff" stop-opacity="0.24"></stop>
              <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
            </linearGradient>
            <filter id="node-shadow" x="-20%" y="-30%" width="140%" height="160%">
              <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"></feDropShadow>
              <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.36"></feDropShadow>
            </filter>
          </defs>
          <g id="map-content">
            <g class="links">${links}</g>
            <g class="nodes" filter="url(#node-shadow)">${nodeHtml}</g>
          </g>
        `;
        fitMap(true);
      }

      async function loadMindmap() {
        nodes.status.textContent = "Loading mindmap.md...";

        try {
          const response = await fetch(`./mindmap.md?ts=${Date.now()}`, {
            cache: "no-store",
          });

          if (!response.ok) {
            throw new Error(`mindmap.md returned ${response.status}`);
          }

          const markdown = await response.text();
          state.markdown = markdown;
          nodes.title.textContent = getTitle(markdown);
          nodes.meta.textContent = `Updated: ${getUpdated(markdown)}. Approach branches are ready for the next content pass.`;
          nodes.source.textContent = markdown;
          renderMindmap(markdown);
          nodes.status.textContent = "Drag to move. Scroll gently to zoom. Center brings the map back.";
        } catch (error) {
          nodes.meta.textContent = "Could not load the source outline.";
          nodes.source.textContent = String(error);
          nodes.svg.innerHTML = "";
          nodes.status.textContent = "Could not load mindmap.md. Check that the file is published next to index.html.";
        }
      }

      nodes.fit.addEventListener("click", () => {
        fitMap();
      });

      nodes.reload.addEventListener("click", loadMindmap);

      nodes.toggleSource.addEventListener("click", () => {
        nodes.outline.classList.toggle("hidden");
        nodes.workspace.classList.toggle("source-hidden");
        window.setTimeout(fitMap, 80);
      });

      nodes.svg.addEventListener("pointerdown", (event) => {
        stopTransformAnimation();
        state.dragging = true;
        state.dragStart = {
          x: event.clientX,
          y: event.clientY,
          panX: state.panX,
          panY: state.panY,
        };
        nodes.svg.setPointerCapture(event.pointerId);
      });

      nodes.svg.addEventListener("pointermove", (event) => {
        if (!state.dragging || !state.dragStart) return;
        state.panX = state.dragStart.panX + event.clientX - state.dragStart.x;
        state.panY = state.dragStart.panY + event.clientY - state.dragStart.y;
        state.targetPanX = state.panX;
        state.targetPanY = state.panY;
        state.targetScale = state.scale;
        applyTransform();
      });

      nodes.svg.addEventListener("pointerup", (event) => {
        state.dragging = false;
        state.dragStart = null;
        nodes.svg.releasePointerCapture(event.pointerId);
      });

      nodes.svg.addEventListener("pointercancel", () => {
        state.dragging = false;
        state.dragStart = null;
      });

      nodes.svg.addEventListener(
        "wheel",
        (event) => {
          event.preventDefault();
          const bounds = nodes.svg.getBoundingClientRect();
          const oldScale = state.targetScale || state.scale;
          const delta = Math.max(-56, Math.min(56, event.deltaY));
          const nextScale = Math.max(0.32, Math.min(1.9, oldScale * Math.exp(-delta * 0.0008)));
          const px = event.clientX - bounds.left;
          const py = event.clientY - bounds.top;
          const nextPanX = px - ((px - state.targetPanX) / oldScale) * nextScale;
          const nextPanY = py - ((py - state.targetPanY) / oldScale) * nextScale;
          setTransformTarget(nextPanX, nextPanY, nextScale);
        },
        { passive: false },
      );

      window.addEventListener("resize", () => fitMap(true));

      loadMindmap();
    </script>
  </body>
</html>
